<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Up Game - XinnStore</title>
  <link rel="stylesheet" href="css/style.css?v=500" />
</head>
<body>
  <header class="navbar">
    <div class="nav-left">
      <div class="logo-box">X</div>
      <div class="logo-text">XinnStore</div>
    </div>

    <a href="index.html" class="back-btn">Kembali</a>
  </header>

  <main class="container">
    <section class="game-hero">
      <img id="gameBanner" src="assets/ml.jpg" alt="Banner Game" class="game-hero-image" />
      <div class="game-hero-overlay"></div>
      <div class="game-hero-title-wrap">
        <span class="hero-badge">TOPUP</span>
        <h1 id="gameTitle">Mobile Legends</h1>
      </div>
    </section>

    <section class="game-panel">
      <p id="gameDesc" class="game-desc">Top up cepat, aman, dan nyaman.</p>

      <div class="form-block">
        <label class="form-label">Masukkan User ID</label>
        <div class="input-row">
          <input type="text" id="userId" class="text-input" placeholder="Masukkan ID" />
          <input type="text" id="zoneId" class="text-input" placeholder="Zone / Server" />
        </div>
      </div>

      <div class="form-block">
        <label class="form-label">Pilih Nominal</label>
        <div class="nominal-grid" id="nominalGrid"></div>
      </div>

      <div class="form-block">
        <label class="form-label">Pilih Pembayaran</label>
        <div class="payment-grid">
          <button class="pay-btn active" data-pay="DANA">DANA</button>
          <button class="pay-btn" data-pay="QRIS">QRIS</button>
          <button class="pay-btn" data-pay="GoPay">GoPay</button>
        </div>
      </div>

      <div class="pay-card">
        <div class="pay-card-title">Metode Terpilih</div>
        <div class="pay-card-value" id="paySelected">DANA</div>
      </div>

      <div class="form-block">
        <label class="form-label">Email</label>
        <input type="email" id="emailNotif" class="text-input full-input" placeholder="Email untuk notifikasi" />
      </div>
    </section>
  </main>

  <div class="bottom-bar">
    <div>
      <div class="bottom-label">Total</div>
      <div class="bottom-price" id="totalPrice">Rp0</div>
    </div>
    <button class="buy-btn" id="buyNowBtn">Bayar</button>
  </div>

  <script src="js/game.js?v=500"></script>
</body>
</html>
