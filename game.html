<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>XinnStore - Top Up</title>
  <link rel="stylesheet" href="css/style.css?v=20" />
</head>
<body>
  <header class="navbar">
    <div class="logo-wrap">
      <div class="logo-box">X</div>
      <div class="logo-text">XinnStore</div>
    </div>
    <a class="login-btn" href="admin/login.html">Login</a>
  </header>

  <main class="container">
    <section class="hero-banner game-banner">
      <img id="gameImage" src="assets/ml.jpg" alt="Game Banner">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1 class="hero-title" id="gameTitle">Mobile Legends</h1>
        <p class="hero-subtitle">Top up cepat, aman, dan otomatis.</p>
      </div>
    </section>

    <section class="detail-box">
      <h2 class="detail-title">Masukkan User ID</h2>
      <div class="input-grid">
        <input type="text" class="form-input" placeholder="Masukkan ID">
        <input type="text" class="form-input" placeholder="Zone / Server (opsional)">
      </div>
    </section>

    <section class="detail-box">
      <h2 class="detail-title">Pilih Nominal</h2>
      <div class="nominal-grid">
        <button class="nominal-card active" data-price="20000" type="button">
          <span class="nominal-name">86 Diamonds</span>
          <span class="nominal-price">Rp20.000</span>
        </button>

        <button class="nominal-card" data-price="39000" type="button">
          <span class="nominal-name">172 Diamonds</span>
          <span class="nominal-price">Rp39.000</span>
        </button>

        <button class="nominal-card" data-price="56000" type="button">
          <span class="nominal-name">257 Diamonds</span>
          <span class="nominal-price">Rp56.000</span>
        </button>

        <button class="nominal-card" data-price="75000" type="button">
          <span class="nominal-name">344 Diamonds</span>
          <span class="nominal-price">Rp75.000</span>
        </button>
      </div>
    </section>

    <section class="detail-box">
      <h2 class="detail-title">Pilih Pembayaran</h2>

      <div class="payment-tabs">
        <button class="pay-method active" type="button">DANA</button>
        <button class="pay-method" type="button">QRIS</button>
        <button class="pay-method" type="button">GoPay</button>
      </div>

      <div class="payment-preview">
        <div class="payment-preview-inner">
          <div class="payment-brand">DANA</div>
          <div class="payment-store">XinnStore</div>
        </div>
      </div>

      <div class="payment-info">
        <div class="payment-info-title">DANA</div>
        <div class="payment-info-number">08xxxxxxxxxx</div>
      </div>

      <input type="email" class="form-input" placeholder="Email untuk notifikasi">
    </section>
  </main>

  <div class="bottom-bar">
    <div class="bottom-price">
      <span class="bottom-label">Total</span>
      <strong id="totalPrice">Rp20.000</strong>
    </div>
    <button class="buy-btn" type="button">Bayar</button>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
