<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Up Game</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <a class="back-link" href="index.html">←</a>
    <div class="logo3"><div class="icon">X</div><span>XinnStore</span></div>
    <div style="width:42px"></div>
  </header>

  <main class="page">
    <section class="game-hero">
      <img id="gameBanner" src="assets/ff.jpg" alt="Banner Game">
      <div class="game-hero-overlay"></div>
      <div class="game-hero-title" id="gameTitle">Free Fire</div>
    </section>

    <div class="card-panel">
      <h3>Masukkan User ID</h3>
      <input class="input" id="userId" placeholder="Masukkan ID">
      <input class="input" id="zone" placeholder="Zone / Server (opsional)">
    </div>

    <div class="card-panel">
      <h3>Pilih Nominal</h3>
      <div class="diamond-grid" id="diamondGrid"></div>
    </div>

    <div class="card-panel">
      <h3>Pilih Pembayaran</h3>
      <div class="payment-list">
        <button class="payment active" data-pay="DANA">DANA</button>
        <button class="payment" data-pay="QRIS">QRIS</button>
        <button class="payment" data-pay="GoPay">GoPay</button>
      </div>
      <div class="pay-info">
        <img src="assets/payment/dana.png" alt="Payment">
        <div>
          <strong id="payTitle">DANA</strong>
          <p id="payValue">08xxxxxxxxxx</p>
        </div>
      </div>
      <input class="input" id="email" placeholder="Email untuk notifikasi">
    </div>
  </main>

  <div class="bottom-bar">
    <div>
      <p class="small-label">Total</p>
      <h2 id="price">Rp0</h2>
    </div>
    <button class="btn" id="buyBtn">Bayar</button>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
