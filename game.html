<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>XinnStore - Top Up</title>
  <link rel="stylesheet" href="css/style.css?v=3000" />
</head>
<body>
  <header class="navbar">
    <div class="logo-wrap">
      <div class="logo-box">X</div>
      <div class="logo-text">XinnStore</div>
    </div>
    <a class="login-btn" href="admin/login.html">Login</a>
  </header>

  <main class="game-page">
    <section class="game-hero">
      <img id="gameImage" src="assets/ml.jpg" alt="Mobile Legends" />
      <div class="game-hero-overlay"></div>
      <div class="game-hero-content">
        <h1 id="gameTitle">Mobile Legends</h1>
        <p>Top up cepat, aman, dan otomatis.</p>
      </div>
    </section>

    <section class="panel">
      <h2>Masukkan User ID</h2>
      <div class="form-stack">
        <input class="input" type="text" placeholder="Masukkan ID" />
        <input class="input" type="text" placeholder="Zone / Server (opsional)" />
      </div>
    </section>

    <section class="panel">
      <h2>Pilih Nominal</h2>
      <div class="nominal-grid">
        <button type="button" class="nominal-card active" data-price="20000">
          <span class="nominal-label">86 Diamonds</span>
          <span class="nominal-value">Rp20.000</span>
        </button>

        <button type="button" class="nominal-card" data-price="39000">
          <span class="nominal-label">172 Diamonds</span>
          <span class="nominal-value">Rp39.000</span>
        </button>

        <button type="button" class="nominal-card" data-price="56000">
          <span class="nominal-label">257 Diamonds</span>
          <span class="nominal-value">Rp56.000</span>
        </button>

        <button type="button" class="nominal-card" data-price="75000">
          <span class="nominal-label">344 Diamonds</span>
          <span class="nominal-value">Rp75.000</span>
        </button>
      </div>
    </section>

    <section class="panel">
      <h2>Pilih Pembayaran</h2>

      <div class="payment-tabs">
        <button type="button" class="pay-tab active">DANA</button>
        <button type="button" class="pay-tab">QRIS</button>
        <button type="button" class="pay-tab">GoPay</button>
      </div>

      <div class="payment-card">
        <div class="payment-card-brand">DANA</div>
        <div class="payment-card-store">XinnStore</div>
      </div>

      <div class="payment-detail">
        <div class="payment-detail-title">DANA</div>
        <div class="payment-detail-number">08xxxxxxxxxx</div>
      </div>

      <input class="input" type="email" placeholder="Email untuk notifikasi" />
    </section>
  </main>

  <div class="checkout-bar">
    <div class="checkout-total">
      <span>Total</span>
      <strong id="totalPrice">Rp20.000</strong>
    </div>
    <button type="button" class="checkout-btn">Bayar</button>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
