<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XinnStore</title>
  <link rel="stylesheet" href="css/style.css?v=900" />
  <link rel="stylesheet" href="css/home.css?v=900" />
</head>
<body>
  <header class="navbar">
    <div class="nav-left">
      <div class="logo-box">X</div>
      <div class="logo-text">XinnStore</div>
    </div>

    <a href="auth/login.html" class="login-btn" id="loginBtn">Login</a>
  </header>

  <main class="container">
    <section class="hero">
      <img src="assets/banner.jpg" alt="Banner XinnStore" class="hero-image" />
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <span class="hero-badge">PROMO</span>
        <h1>Top Up Game Cepat & Aman</h1>
        <p>Klik game favorit kamu lalu pilih nominal dan pembayaran.</p>
      </div>
    </section>

    <section class="tab-section">
      <div class="tabs">
        <a class="tab active" href="#populer">Lagi Populer</a>
        <a class="tab" href="#topup">Top Up</a>
        <a class="tab" href="#ewallet">E-Wallet</a>
      </div>
      <div class="tab-progress">
        <div class="tab-progress-fill"></div>
      </div>
    </section>

    <section class="section" id="populer">
      <div class="section-header">
        <h2>Lagi Populer</h2>
      </div>

      <div class="home-grid home-grid-2">
        <a class="home-card home-wide" href="game.html?game=free-fire">
          <img src="assets/ff.jpg" alt="Free Fire" />
          <div class="home-card-overlay"></div>
          <div class="home-card-label">Free Fire</div>
        </a>

        <a class="home-card home-wide" href="game.html?game=mobile-legends">
          <img src="assets/ml.jpg" alt="Mobile Legends" />
          <div class="home-card-overlay"></div>
          <div class="home-card-label">Mobile Legends</div>
        </a>

        <a class="home-card home-wide" href="game.html?game=roblox">
          <img src="assets/roblox.jpg" alt="Roblox" />
          <div class="home-card-overlay"></div>
          <div class="home-card-label">Roblox</div>
        </a>

        <a class="home-card home-wide" href="game.html?game=free-fire">
          <img src="assets/ff.jpg" alt="Free Fire MAX" />
          <div class="home-card-overlay"></div>
          <div class="home-card-label">Free Fire MAX</div>
        </a>
      </div>
    </section>

    <section class="section" id="topup">
      <div class="section-header">
        <h2>Top Up</h2>
      </div>

      <div class="home-grid home-grid-3">
        <a class="home-card home-tall" href="game.html?game=mobile-legends">
          <img src="assets/ml.jpg" alt="Mobile Legends" />
          <div class="home-card-overlay"></div>
          <div class="home-card-label">Mobile Legends</div>
        </a>

        <a class="home-card home-tall" href="game.html?game=free-fire">
          <img src="assets/ff.jpg" alt="Free Fire" />
          <div class="home-card-overlay"></div>
          <div class="home-card-label">Free Fire</div>
        </a>

        <a class="home-card home-tall" href="game.html?game=roblox">
          <img src="assets/roblox.jpg" alt="Roblox" />
          <div class="home-card-overlay"></div>
          <div class="home-card-label">Roblox</div>
        </a>
      </div>
    </section>

    <section class="section" id="ewallet">
      <div class="section-header">
        <h2>E-Wallet</h2>
      </div>

      <div class="home-grid home-grid-3">
        <div class="home-card home-tall">
          <img src="assets/dana.jpg" alt="DANA" />
          <div class="home-card-overlay"></div>
          <div class="home-card-label">DANA</div>
        </div>

        <div class="home-card home-tall">
          <img src="assets/gopay.jpg" alt="GoPay" />
          <div class="home-card-overlay"></div>
          <div class="home-card-label">GoPay</div>
        </div>

        <div class="home-card home-tall">
          <img src="assets/ovo.jpg" alt="OVO" />
          <div class="home-card-overlay"></div>
          <div class="home-card-label">OVO</div>
        </div>
      </div>
    </section>
  </main>

  <script src="js/script.js?v=900"></script>
  <script type="module" src="js/user.js?v=900"></script>
</body>
  </html>
