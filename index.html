<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XinnStore</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="navbar">
  <div class="logo">XinnStore</div>
  <button class="login-btn" onclick="goLogin()">Login</button>
</header>

<section class="hero">
  <img src="assets/banner.jpg">
  <div class="hero-text">
    <h2>Top Up Game Cepat & Aman</h2>
    <p>Klik game favorit kamu lalu pilih nominal</p>
  </div>
</section>

<div class="tabs">
  <a href="#populer">Lagi Populer</a>
  <a href="#topup">Top Up</a>
  <a href="#ewallet">E-Wallet</a>
</div>

<section id="populer">
  <h3>Lagi Populer</h3>
  <div class="grid">
    <a href="game.html?game=free-fire"><img src="assets/ff.jpg"><p>Free Fire</p></a>
    <a href="game.html?game=mobile-legends"><img src="assets/ml.jpg"><p>Mobile Legends</p></a>
    <a href="game.html?game=roblox"><img src="assets/roblox.jpg"><p>Roblox</p></a>
    <a href="game.html?game=free-fire"><img src="assets/ff.jpg"><p>Free Fire MAX</p></a>
  </div>
</section>

<section id="topup">
  <h3>Top Up</h3>
  <div class="grid">
    <a href="game.html?game=mobile-legends"><img src="assets/ml.jpg"><p>Mobile Legends</p></a>
    <a href="game.html?game=free-fire"><img src="assets/ff.jpg"><p>Free Fire</p></a>
    <a href="game.html?game=roblox"><img src="assets/roblox.jpg"><p>Roblox</p></a>
  </div>
</section>

<section id="ewallet">
  <h3>E-Wallet</h3>
  <div class="grid">
    <div><img src="assets/dana.jpg"><p>DANA</p></div>
    <div><img src="assets/gopay.jpg"><p>GoPay</p></div>
    <div><img src="assets/ovo.jpg"><p>OVO</p></div>
  </div>
</section>

<script src="js/script.js"></script>
<script type="module" src="js/user.js"></script>

</body>
</html>
