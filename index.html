<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XinnStore</title>

  <link rel="stylesheet" href="css/style.css?v=99" />
  <link rel="stylesheet" href="css/home.css?v=99" />
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="nav-left">
      <div class="logo-box">X</div>
      <div class="logo-text">XinnStore</div>
    </div>

    <!-- LOGIN USER -->
    <a href="auth/login.html" class="login-btn" id="loginBtn">Login</a>
  </header>

  <!-- MAIN -->
  <main class="container">

    <!-- HERO -->
    <section class="hero">
      <img src="assets/banner.jpg" class="hero-image" />
      <div class="hero-overlay"></div>

      <div class="hero-content">
        <span class="hero-badge">PROMO</span>
        <h1>Top Up Game Cepat & Aman</h1>
        <p>Klik game favorit kamu lalu pilih nominal dan pembayaran.</p>
      </div>
    </section>

    <!-- TAB -->
    <section class="tab-section">
      <div class="tabs">
        <a class="tab active">Lagi Populer</a>
        <a class="tab">Top Up</a>
        <a class="tab">E-Wallet</a>
      </div>
      <div class="tab-progress">
        <div class="tab-progress-fill"></div>
      </div>
    </section>

    <!-- POPULER -->
    <section class="section">
      <h2>Lagi Populer</h2>

      <div class="home-grid home-grid-2">
        <a href="game.html?game=free-fire" class="home-card">
          <img src="assets/ff.jpg" />
          <div class="home-card-label">Free Fire</div>
        </a>

        <a href="game.html?game=mobile-legends" class="home-card">
          <img src="assets/ml.jpg" />
          <div class="home-card-label">Mobile Legends</div>
        </a>

        <a href="game.html?game=roblox" class="home-card">
          <img src="assets/roblox.jpg" />
          <div class="home-card-label">Roblox</div>
        </a>

        <a href="game.html?game=free-fire" class="home-card">
          <img src="assets/ff.jpg" />
          <div class="home-card-label">Free Fire MAX</div>
        </a>
      </div>
    </section>

    <!-- TOPUP -->
    <section class="section">
      <h2>Top Up</h2>

      <div class="home-grid home-grid-3">
        <a href="game.html?game=mobile-legends" class="home-card">
          <img src="assets/ml.jpg" />
          <div class="home-card-label">Mobile Legends</div>
        </a>

        <a href="game.html?game=free-fire" class="home-card">
          <img src="assets/ff.jpg" />
          <div class="home-card-label">Free Fire</div>
        </a>

        <a href="game.html?game=roblox" class="home-card">
          <img src="assets/roblox.jpg" />
          <div class="home-card-label">Roblox</div>
        </a>
      </div>
    </section>

    <!-- EWALLET -->
    <section class="section">
      <h2>E-Wallet</h2>

      <div class="home-grid home-grid-3">
        <div class="home-card">
          <img src="assets/dana.jpg" />
          <div class="home-card-label">DANA</div>
        </div>

        <div class="home-card">
          <img src="assets/gopay.jpg" />
          <div class="home-card-label">GoPay</div>
        </div>

        <div class="home-card">
          <img src="assets/ovo.jpg" />
          <div class="home-card-label">OVO</div>
        </div>
      </div>
    </section>

  </main>

  <!-- SCRIPT -->
  <script type="module" src="js/user.js?v=99"></script>

</body>
</html>
