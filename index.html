<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XinnStore</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="navbar">
    <div class="logo-wrap">
      <div class="logo-box">X</div>
      <div class="logo-text">XinnStore</div>
    </div>
    <a class="login-btn" href="admin/login.html">Login</a>
  </div>

  <div class="container">
    <div class="hero-banner">
      <img src="assets/banner.jpg" alt="Banner XinnStore">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="hero-badge">PROMO</div>
        <div class="hero-title">Top Up Game Cepat & Aman</div>
        <div class="hero-subtitle">Klik game favorit kamu lalu pilih nominal dan pembayaran.</div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active">Lagi Populer</div>
      <div class="tab">Top Up</div>
      <div class="tab">E-Wallet</div>
    </div>

    <div class="tab-line">
      <div class="tab-line-fill"></div>
    </div>

    <div class="section-title" id="populer">Lagi Populer</div>
    <div class="game-grid">
      <a class="game-card" href="game.html?game=free-fire">
        <img src="assets/ff.jpg" alt="Free Fire">
        <div class="game-name">Free Fire</div>
      </a>

      <a class="game-card" href="game.html?game=mobile-legends">
        <img src="assets/ml.jpg" alt="Mobile Legends">
        <div class="game-name">Mobile Legends</div>
      </a>

      <a class="game-card" href="game.html?game=roblox">
        <img src="assets/roblox.jpg" alt="Roblox">
        <div class="game-name">Roblox</div>
      </a>

      <a class="game-card" href="game.html?game=free-fire-max">
        <img src="assets/ff.jpg" alt="Free Fire MAX">
        <div class="game-name">Free Fire MAX</div>
      </a>
    </div>

    <div class="section-title" id="topup">Top Up</div>
    <div class="game-grid">
      <a class="game-card" href="game.html?game=mobile-legends">
        <img src="assets/ml.jpg" alt="Mobile Legends">
        <div class="game-name">Mobile Legends</div>
      </a>

      <a class="game-card" href="game.html?game=free-fire">
        <img src="assets/ff.jpg" alt="Free Fire">
        <div class="game-name">Free Fire</div>
      </a>

      <a class="game-card" href="game.html?game=roblox">
        <img src="assets/roblox.jpg" alt="Roblox">
        <div class="game-name">Roblox</div>
      </a>

      <a class="game-card" href="game.html?game=free-fire-max">
        <img src="assets/ff.jpg" alt="Free Fire MAX">
        <div class="game-name">Free Fire MAX</div>
      </a>
    </div>

    <div class="section-title" id="ewallet">E-Wallet</div>
    <div class="wallet-grid">
      <a class="wallet-card" href="#">
        <img src="assets/dana.jpg" alt="DANA">
        <div class="wallet-name">DANA</div>
      </a>

      <a class="wallet-card" href="#">
        <img src="assets/gopay.jpg" alt="GoPay">
        <div class="wallet-name">GoPay</div>
      </a>

      <a class="wallet-card" href="#">
        <img src="assets/ovo.jpg" alt="OVO">
        <div class="wallet-name">OVO</div>
      </a>
    </div>
  </div>

  <button class="floating-btn">🧾</button>

  <script src="js/script.js"></script>
</body>
</html>
