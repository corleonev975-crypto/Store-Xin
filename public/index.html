<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XinnStore</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo3"><div class="icon">X</div><span>XinnStore</span></div>
    <a class="login-btn" href="admin/login.html">Login</a>
  </header>

  <main class="page">
    <section class="hero-banner">
      <img src="assets/banner.jpg" alt="Banner">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <span class="hero-badge">PROMO</span>
        <h1>Top Up Game Cepat & Aman</h1>
        <p>Klik game favorit kamu lalu pilih nominal dan pembayaran.</p>
      </div>
    </section>

    <section class="tabs-wrap">
      <nav class="tabs">
        <a class="tab active" href="#populer">Lagi Populer</a>
        <a class="tab" href="#topup">Top Up</a>
        <a class="tab" href="#ewallet">E-Wallet</a>
      </nav>
      <div class="tab-line"><div class="tab-fill"></div></div>
    </section>

    <section class="section" id="populer">
      <h2 class="section-title">Lagi Populer</h2>
      <div class="grid-2">
        <a class="card wide" href="game.html?game=free-fire"><img src="assets/ff.jpg" alt=""><div class="card-overlay"></div><p>Free Fire</p></a>
        <a class="card wide" href="game.html?game=mobile-legends"><img src="assets/ml.jpg" alt=""><div class="card-overlay"></div><p>Mobile Legends</p></a>
        <a class="card wide" href="game.html?game=roblox"><img src="assets/roblox.jpg" alt=""><div class="card-overlay"></div><p>Roblox</p></a>
        <a class="card wide" href="game.html?game=free-fire"><img src="assets/ff.jpg" alt=""><div class="card-overlay"></div><p>Free Fire MAX</p></a>
      </div>
    </section>

    <section class="section" id="topup">
      <h2 class="section-title">Top Up</h2>
      <div class="grid-3">
        <a class="card tall" href="game.html?game=mobile-legends"><img src="assets/ml.jpg" alt=""><div class="card-overlay"></div><p>Mobile Legends</p></a>
        <a class="card tall" href="game.html?game=free-fire"><img src="assets/ff.jpg" alt=""><div class="card-overlay"></div><p>Free Fire</p></a>
        <a class="card tall" href="game.html?game=roblox"><img src="assets/roblox.jpg" alt=""><div class="card-overlay"></div><p>Roblox</p></a>
      </div>
    </section>

    <section class="section" id="ewallet">
      <h2 class="section-title">E-Wallet</h2>
      <div class="grid-3">
        <a class="card tall" href="#"><img src="assets/dana.jpg" alt=""><div class="card-overlay"></div><p>DANA</p></a>
        <a class="card tall" href="#"><img src="assets/gopay.jpg" alt=""><div class="card-overlay"></div><p>GoPay</p></a>
        <a class="card tall" href="#"><img src="assets/ovo.jpg" alt=""><div class="card-overlay"></div><p>OVO</p></a>
      </div>
    </section>
  </main>
  <script src="js/script.js"></script>
</body>
</html>
